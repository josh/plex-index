name: Publish

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0

      - name: Install dependencies
        run: uv sync

      - name: Download from gh-pages
        run: |
          curl --fail --silent --show-error "https://josh.github.io/plex-index/plex.parquet" --output plex.parquet

      - name: Update index
        run: |
          uv run plex-index plex.parquet
        env:
          PLEX_TOKEN: ${{ secrets.PLEX_TOKEN }}
          PLEX_SERVER_NAME: ${{ secrets.PLEX_SERVER_NAME }}
          IMDB_WATCHLIST_URL: ${{ vars.IMDB_WATCHLIST_URL }}
          DISCOVER_LIMIT: ${{ vars.DISCOVER_LIMIT }}
          REFRESH_LIMIT: ${{ vars.REFRESH_LIMIT }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: plex
          path: plex.parquet
          retention-days: 7

  deploy:
    runs-on: ubuntu-slim
    needs: update

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download parquet artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: data/

      - name: Flatten directory structure
        run: |
          find data -name "*.parquet" -exec mv {} data/ \;
          find data -type d -empty -delete

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: data/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
